openapi: 3.0.3
info:
  title: MediAssist Pharmacy Assistant API
  description: |
    A production-ready agentic pharmacy assistant backend powered by Gemini AI and openFDA Drug Label API.

    ## Overview

    MediAssist provides authoritative drug information from FDA drug labels through an AI-powered conversational interface. The system uses Gemini for reasoning and openFDA as the data source, ensuring all medical information is verified and accurate.

    ## Key Features

    - **FDA-Verified Data**: All drug information comes directly from openFDA Drug Label database
    - **AI-Powered Reasoning**: Gemini analyzes queries and decides when to fetch data
    - **Safety-First Design**: Automatically refuses dangerous queries (dosing, children, pregnancy)
    - **Drug Name Normalization**: Handles brand names and international variants
    - **No Hallucination**: Only returns verified FDA data, never invents information

    ## Safety Rules

    The API will refuse to answer queries about:
    - Personal dosing recommendations
    - Medication for children
    - Pregnancy/breastfeeding safety
    - Medication with liver/kidney conditions
    - Medical advice or treatment recommendations

    ## Supported Queries

    - Drug side effects and adverse reactions
    - Drug warnings and precautions
    - Drug interactions
    - Indications and usage
    - General drug information
    - Contraindications

  version: 1.0.0
  contact:
    name: MediAssist Support
    url: https://github.com/yourusername/mediassist
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.mediassist.example.com
    description: Production server (example)

tags:
  - name: Agent
    description: AI agent chat endpoints for drug information queries
  - name: Health
    description: Service health and status endpoints

paths:
  /agent/chat:
    post:
      tags:
        - Agent
      summary: Chat with pharmacy assistant
      description: |
        Send a message to the AI pharmacy assistant to get information about medications.

        The agent will:
        1. Analyze your query for safety concerns
        2. Decide if FDA data is needed
        3. Query openFDA if necessary
        4. Provide a human-readable response with safety disclaimer

        **Safety Note**: Queries about personal dosing, children, pregnancy, or medical advice will be refused with an appropriate explanation.

      operationId: chatWithAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            examples:
              sideEffects:
                summary: Query about side effects
                value:
                  message: "What are the side effects of ibuprofen?"
              drugPurpose:
                summary: Query about drug purpose
                value:
                  message: "What is metformin used for?"
              warnings:
                summary: Query about warnings
                value:
                  message: "What are the warnings for aspirin?"
              brandName:
                summary: Query with brand name
                value:
                  message: "Tell me about Tylenol"
              generalInfo:
                summary: General drug information
                value:
                  message: "What is atorvastatin?"
              greeting:
                summary: Conversational greeting
                value:
                  message: "Hello!"
      responses:
        "200":
          description: Successful response from the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              examples:
                successWithFDA:
                  summary: Successful response with FDA data
                  value:
                    answer: |
                      Based on FDA drug label data, ibuprofen may cause the following side effects:

                      Common side effects include:
                      • Nausea
                      • Heartburn
                      • Dizziness
                      • Headache
                      • Stomach pain

                      More serious side effects may include:
                      • Allergic reactions
                      • Liver problems
                      • Cardiovascular events

                      ⚠️ SAFETY DISCLAIMER: This information is from FDA drug labels and is for educational purposes only. It is NOT a substitute for professional medical advice, diagnosis, or treatment. Always consult your healthcare provider before starting, stopping, or changing any medication.
                refusalDosing:
                  summary: Refused query (dosing)
                  value:
                    answer: "I cannot provide personal dosage recommendations. Medication dosing must be determined by a healthcare professional based on your individual medical history, current medications, and health conditions. Please consult your doctor or pharmacist."
                refusalChildren:
                  summary: Refused query (children)
                  value:
                    answer: "I cannot provide medication information for children. Pediatric medication use requires professional medical guidance based on the child's age, weight, and health status. Please consult your pediatrician or pharmacist."
                greeting:
                  summary: Conversational response
                  value:
                    answer: "Hello! I'm a pharmacy information assistant. I can help you learn about medications using FDA drug label data. What would you like to know about a specific drug?"
        "400":
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
              examples:
                emptyMessage:
                  summary: Empty message
                  value:
                    error: "Invalid request"
                    details:
                      - field: "message"
                        message: "Message cannot be empty"
                messageTooLong:
                  summary: Message too long
                  value:
                    error: "Invalid request"
                    details:
                      - field: "message"
                        message: "Message too long"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerError"
              example:
                error: "Internal server error"
                message: "An error occurred while processing your request. Please try again."

  /agent/health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the current health status of the service
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: "healthy"
                service: "MediAssist Agent"
                timestamp: "2025-12-13T10:30:00.000Z"

  /:
    get:
      tags:
        - Health
      summary: API information
      description: Returns basic information about the API
      operationId: getApiInfo
      responses:
        "200":
          description: API information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiInfo"
              example:
                service: "MediAssist Backend"
                version: "1.0.0"
                description: "Agentic pharmacy assistant powered by Gemini and openFDA"
                endpoints:
                  chat: "POST /agent/chat"
                  health: "GET /agent/health"

components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
          description: User's message or query about medication
          example: "What are the side effects of ibuprofen?"
      description: Request payload for chat endpoint

    ChatResponse:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
          description: |
            AI-generated response to the user's query. May include:
            - Drug information from FDA labels
            - Safety refusal message
            - Conversational response
            - Always includes safety disclaimer for medical information
          example: "Based on FDA drug label data, ibuprofen may cause nausea, heartburn, and dizziness..."
      description: Response from the agent

    ValidationError:
      type: object
      required:
        - error
        - details
      properties:
        error:
          type: string
          example: "Invalid request"
          description: Error type
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "message"
                description: Field that failed validation
              message:
                type: string
                example: "Message cannot be empty"
                description: Validation error message
          description: List of validation errors
      description: Validation error response

    ServerError:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          example: "Internal server error"
          description: Error type
        message:
          type: string
          example: "An error occurred while processing your request. Please try again."
          description: User-friendly error message
      description: Server error response

    HealthResponse:
      type: object
      required:
        - status
        - service
        - timestamp
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
          example: "healthy"
          description: Health status of the service
        service:
          type: string
          example: "MediAssist Agent"
          description: Service name
        timestamp:
          type: string
          format: date-time
          example: "2025-12-13T10:30:00.000Z"
          description: Current server time
      description: Health check response

    ApiInfo:
      type: object
      required:
        - service
        - version
        - description
        - endpoints
      properties:
        service:
          type: string
          example: "MediAssist Backend"
          description: Service name
        version:
          type: string
          example: "1.0.0"
          description: API version
        description:
          type: string
          example: "Agentic pharmacy assistant powered by Gemini and openFDA"
          description: Service description
        endpoints:
          type: object
          properties:
            chat:
              type: string
              example: "POST /agent/chat"
            health:
              type: string
              example: "GET /agent/health"
          description: Available endpoints
      description: API information response

  examples:
    ValidQueries:
      summary: Examples of valid queries
      value:
        - "What are the side effects of ibuprofen?"
        - "What is metformin used for?"
        - "What are the warnings for aspirin?"
        - "Tell me about atorvastatin"
        - "What drugs interact with warfarin?"
        - "What are the contraindications for lisinopril?"
        - "What is acetaminophen?"
        - "Side effects of Tylenol"
        - "What is Advil used for?"

    RefusedQueries:
      summary: Examples of queries that will be refused
      value:
        - "How much ibuprofen should I take?"
        - "Can I give aspirin to my 5-year-old?"
        - "Is this safe during pregnancy?"
        - "I have kidney disease, can I take this?"
        - "Should I take this medication?"
        - "What dose is right for me?"

x-documentation:
  architecture:
    description: |
      MediAssist uses a ReAct (Reason-Act-Observe-Synthesize) agent pattern with Gemini AI as the reasoning engine and openFDA as the data source.

      Flow:
      1. User sends query
      2. Safety check (refuse dangerous queries)
      3. Gemini analyzes intent
      4. If needed, query openFDA Drug Label API
      5. Map FDA data to structured format
      6. Gemini synthesizes human-readable response
      7. Return with safety disclaimer

  safety:
    description: |
      Three-layer safety system:
      1. Hard Refusal: Keyword detection before LLM
      2. System Prompt: LLM instructions to refuse unsafe queries
      3. Mandatory Disclaimer: Added to all medical responses

  drugNameNormalization:
    description: |
      The system automatically normalizes brand names to generic names:
      - paracetamol → acetaminophen
      - Tylenol, Panadol → acetaminophen
      - Advil, Motrin → ibuprofen
      - And many more...

  dataSource:
    description: |
      All drug information comes from the openFDA Drug Label API (https://open.fda.gov/apis/drug/label/)
      This is the official FDA database of approved drug labeling.
